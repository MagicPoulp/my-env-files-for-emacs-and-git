# --- Localization ---
d-i debian-installer/locale string en_US.UTF-8
d-i console-setup/ask_detect boolean false
d-i debian-installer/keymap select fr(latin9)
d-i keyboard-configuration/xkb-keymap select fr(latin9)
d-i keyboard-configuration/layoutcode string fr

# --- Network Configuration ---
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string local

# --- User Accounts ---
d-i passwd/root-login boolean false
d-i passwd/user-fullname string User
d-i passwd/username string user
d-i passwd/user-password password SilverDisk123!
d-i passwd/user-password-again password SilverDisk123!

# --- Partitioning (Encrypted LVM) ---
# TARGET DISK: Change /dev/sda to your target (e.g., /dev/nvme0n1 or /dev/vda)
#d-i partman-auto/disk string /dev/sda
# We leave 'disk string' out so the installer asks which drive to use
d-i partman-auto/select_disk select
d-i partman-auto/method string crypto
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/purge_lvm_from_device boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_vg_name string debian-vg
d-i partman-auto/choose_recipe select efi-boot-crypto

d-i partman-auto/expert_recipe string \
      efi-boot-crypto :: \
              256 256 256 fat32 \
                      $primary{ } \
                      method{ efi } format{ } \
              . \
              300 300 300 ext4 \
                      $primary{ } $bootable{ } \
                      method{ format } format{ } \
                      use_filesystem{ } filesystem{ ext4 } \
                      mountpoint{ /boot } \
              . \
              2048 2048 2048 linux-swap \
                      $lvmok{ } \
                      lv_name{ swap } \
                      method{ swap } format{ } \
              . \
              1000 10000 -1 ext4 \
                      $lvmok{ } \
                      lv_name{ root } \
                      method{ format } format{ } \
                      use_filesystem{ } filesystem{ ext4 } \
                      mountpoint{ / } \
              .

# --- Encryption Settings ---
d-i partman-crypto/password password SilverDisk123!
d-i partman-crypto/password-again password SilverDisk123!
d-i partman-crypto/passphrase password SilverDisk123!
d-i partman-crypto/passphrase-again password SilverDisk123!
d-i partman-crypto/passphrase-plugin string /bin/echo SilverDisk123!
d-i partman-crypto/confirm boolean true
d-i partman-crypto/confirm_nooverwrite boolean true
d-i partman-crypto/weak_passphrase boolean true
d-i partman-crypto/passphrase-at-static-priority boolean true
d-i partman-crypto/check_entropy boolean false
d-i partman-auto-crypto/erase_data boolean true

# --- Finalize Partitioning ---
d-i partman-efi/non_executable_efi boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# --- Package Selection ---
tasksel tasksel/first multiselect standard, desktop, gnome-desktop
d-i pkgsel/include string curl sudo git firmware-linux-nonfree libpam-pwquality libpwquality-tools cryptsetup lvm2
d-i pkgsel/upgrade select full-upgrade
d-i popularity-contest/participate boolean false

# --- Bootloader ---
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/force-efi-extra-removable boolean true

# --- Post-Install (Late Command) ---
d-i preseed/late_command string \
    in-target sh -c "sed -i 's/# minlen = 8/minlen = 12/' /etc/security/pwquality.conf"; \
    in-target sh -c "sed -i 's/# dcredit = 0/dcredit = -1/' /etc/security/pwquality.conf"; \
    in-target sh -c "sed -i 's/# ucredit = 0/ucredit = -1/' /etc/security/pwquality.conf"; \
    in-target sh -c "sed -i 's/# lcredit = 0/lcredit = -1/' /etc/security/pwquality.conf"; \
    in-target sh -c "sed -i 's/# ocredit = 0/ocredit = -1/' /etc/security/pwquality.conf"; \
    in-target sh -c "sed -i 's/# minclass = 0/minclass = 4/' /etc/security/pwquality.conf"; \
    in-target sh -c "sed -i 's/# retry = 3/retry = 3/' /etc/security/pwquality.conf"; \
    in-target sh -c "printf 'Name: Enforce faillock\nDefault: yes\nPriority: 1024\nAuth-Type: Primary\nAuth:\n\t[success=1 default=ignore] pam_unix.so try_first_pass\n\trequired pam_faillock.so authfail deny=3 unlock_time=1800\n\trequired pam_faillock.so preauth silent deny=3 unlock_time=1800\nAccount:\n\trequired pam_faillock.so\n' > /usr/share/pam-configs/faillock_custom"; \
    in-target pam-auth-update --package --enable faillock_custom; \
    in-target adduser user sudo; \
    in-target chage -d 0 user; \
    in-target sh -c "printf '#!/bin/bash\nENCRYPTED_PART=\$(pvs --noheadings -o pv_name | sed 's|.*/||;s/_crypt//')\nOLD_PASS=\"SilverDisk123!\"\nif [ -z \"\$ENCRYPTED_PART\" ]; then echo \"Error: Could not find encrypted partition.\"; exit 1; fi\nwhile true; do\n  read -rs -p \"Enter NEW Disk Passphrase: \" p\n  echo\n  if echo \"\$p\" | pwscore > /dev/null; then\n    echo -n \"\$p\" | cryptsetup luksChangeKey \"\$ENCRYPTED_PART\" --key-file <(echo -n \"\$OLD_PASS\")\n    if [ \$? -eq 0 ]; then\n      echo \"Success! Disk key updated.\"\n      break\n    else\n      echo \"Error: Current password incorrect or cryptsetup error.\"\n      exit 1\n    fi\n  else\n    echo \"Too weak! Needs 12 chars & 4 classes.\"\n  fi\ndone\n' > /usr/local/bin/secure-disk-update"; \
    in-target chmod +x /usr/local/bin/secure-disk-update; \
    in-target sh -c "echo '' >> /etc/issue; echo '*** ACTION REQUIRED ***' >> /etc/issue; echo '1. Login to reset USER password.' >> /etc/issue; echo '2. Run: sudo secure-disk-update' >> /etc/issue; echo '3. Return to GNOME (Ctrl+Alt+F1).' >> /etc/issue; cp /etc/issue /etc/motd"; \
    in-target mkdir -p /etc/dconf/profile /etc/dconf/db/local.d/; \
    in-target sh -c "echo 'user-db:user\nsystem-db:local' > /etc/dconf/profile/user"; \
    in-target sh -c "printf \"[org/gnome/desktop/interface]\ncolor-scheme='prefer-dark'\ngtk-theme='Adwaita-dark'\nfont-name='Monospace 14'\ndocument-font-name='Monospace 14'\nmonospace-font-name='Monospace 14'\n\" > /etc/dconf/db/local.d/01-custom-ui"; \
    in-target dconf update; \
    in-target sed -i 's/GRUB_TIMEOUT=[0-9]*/GRUB_TIMEOUT=2/' /etc/default/grub; \
    in-target update-grub

d-i finish-install/reboot_in_progress note