# --- 1. PRE-INSTALL DISK PICKER WITH PROXY PROMPT ---
d-i preseed/early_command string \
    exec < /dev/tty > /dev/tty; \
    stty sane; \
    if [ -f /tmp/disk_selected ]; then exit 0; fi; \
    echo "====================================================="; \
    echo "            NETWORK PROXY CONFIGURATION              "; \
    echo "====================================================="; \
    printf "Do you want to use the Schneider proxy? (y/n): "; \
    read USE_PROXY; \
    echo "Press ENTER..."; \
    PROXY_URL="http://gateway.schneider.zscaler.net:80"; \
    if [ "$USE_PROXY" = "y" ] || [ "$USE_PROXY" = "Y" ]; then \
        export http_proxy="$PROXY_URL"; \
        export https_proxy="$PROXY_URL"; \
        debconf-set mirror/http/proxy "$PROXY_URL"; \
        echo "--> Proxy ENABLED: $PROXY_URL"; \
        touch /tmp/proxy_set; \
    else \
        debconf-set mirror/http/proxy ""; \
        echo "--> Proxy DISABLED (Direct connection)"; \
    fi; \
    while true; do \
        echo "====================================================="; \
        echo "        MANUAL DISK SELECTION (DETAILED LIST)        "; \
        echo "====================================================="; \
        echo "DEVICE   SIZE        MODEL - SERIAL"; \
        for DEV_PATH in $(/usr/bin/list-devices disk); do \
            DEV_NAME=$(basename $DEV_PATH); \
            if [ -e "/sys/block/$DEV_NAME" ]; then \
                SIZE_BLOCKS=$(cat /sys/block/$DEV_NAME/size 2>/dev/null || echo 0); \
                SIZE_GB=$(( $SIZE_BLOCKS * 512 / 1024 / 1024 / 1024 )); \
                MODEL=$(cat /sys/block/$DEV_NAME/device/model 2>/dev/null || echo "Unknown"); \
                echo "$DEV_NAME     ${SIZE_GB}GB      $MODEL"; \
            fi; \
        done; \
        echo "====================================================="; \
        echo "DANGER: the disk name nvmeX is non-persistent and can alternate. It can end by 0 one time, and by 1 another time."; \
        echo "DANGER: to erase wrongly the Windows disk. Type this command on Windows to check the persistent serial number:"; \
        echo "    wmic diskdrive get model,serialnumber"; \
        echo ""; \
        printf "Type the disk name to ERASE (e.g. nvme0n1 IF CORRECT): "; \
        read TARGET; \
        if [ -n "$TARGET" ] && [ -b "/dev/$TARGET" ]; then \
            swapoff -a 2>/dev/null; \
            vgchange -an 2>/dev/null; \
            wipefs -a /dev/$TARGET; \
            dd if=/dev/zero of=/dev/$TARGET bs=1M count=50 conv=notrunc; \
            echo "Press ENTER..."; \
            debconf-set partman-auto/disk "/dev/$TARGET"; \
            echo "Press ENTER again..."; \
            debconf-set grub-installer/bootdev "/dev/$TARGET"; \
            touch /tmp/disk_selected; \
            echo "SUCCESS: /dev/$TARGET has been selected."; \
            sleep 1; \
            break; \
        else \
            echo "Invalid selection. Press Enter to refresh."; \
            read tmp; \
            echo ""; \
        fi; \
    done

# --- 2. Localization ---
d-i debian-installer/locale string en_US.UTF-8
d-i console-setup/ask_detect boolean false
d-i debian-installer/keymap select fr(latin9)
d-i keyboard-configuration/xkb-keymap select fr(latin9)
d-i keyboard-configuration/layoutcode string fr

# --- 3. Network & Mirror ---
d-i netcfg/choose_interface select auto
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# --- 4. User Accounts ---
d-i passwd/root-login boolean false
d-i passwd/user-fullname string User
d-i passwd/username string user
d-i passwd/user-password password SilverDisk123!
d-i passwd/user-password-again password SilverDisk123!

# --- 5. Partitioning (Encrypted LVM) ---
d-i partman-auto/method string crypto
d-i partman-auto/disk string /dev/sda
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_vg_name string crypt

d-i partman-auto/choose_recipe select boot-crypto
d-i partman-auto/expert_recipe string \
      boot-crypto :: \
              256 256 256 fat32 \
                      $primary{ } \
                      method{ efi } format{ } \
              . \
              512 512 512 ext4 \
                      $primary{ } $bootable{ } \
                      method{ format } format{ } \
                      use_filesystem{ } filesystem{ ext4 } \
                      mountpoint{ /boot } \
              . \
              2048 2048 2048 linux-swap \
                      $lvmok{ } lv_name{ swap } \
                      in_vg { crypt } \
                      $primary{ } \
                      method{ swap } format{ } \
              . \
              1000 10000 -1 ext4 \
                      $lvmok{ } lv_name{ root } \
                      in_vg { crypt } \
                      $primary{ } \
                      method{ format } format{ } \
                      use_filesystem{ } filesystem{ ext4 } \
                      mountpoint{ / } \
              .

# --- 6. Encryption Settings ---
d-i partman-crypto/passphrase password SilverDisk123!
d-i partman-crypto/passphrase-again password SilverDisk123!
d-i partman-crypto/confirm boolean true
d-i partman-crypto/confirm_nooverwrite boolean true
d-i partman-crypto/weak_passphrase boolean true
d-i partman-crypto/check_entropy boolean false
d-i partman-auto-crypto/erase_data boolean false

# --- 7. Finalize Partitioning ---
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# --- 8. Package Selection ---
tasksel tasksel/first multiselect standard, desktop, gnome-desktop
d-i pkgsel/include string curl sudo git firmware-linux-nonfree libpam-pwquality libpwquality-tools cryptsetup lvm2 isenkram-cli
d-i pkgsel/upgrade select full-upgrade
d-i popularity-contest/participate boolean false

# --- 9. Bootloader ---
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/force-efi-extra-removable boolean true
d-i grub-installer/update-nvram boolean false

# --- 10. Post-Install (Late Command) ---
d-i preseed/late_command string \
    in-target rm -f /etc/apt/sources.list; \
    in-target sh -c 'echo "Types: deb" > /etc/apt/sources.list.d/debian.sources; \
    echo "URIs: http://deb.debian.org/debian/" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Suites: trixie trixie-updates" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Components: main contrib non-free non-free-firmware" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg" >> /etc/apt/sources.list.d/debian.sources; \
    echo "" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Types: deb" >> /etc/apt/sources.list.d/debian.sources; \
    echo "URIs: http://security.debian.org/debian-security" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Suites: trixie-security" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Components: main contrib non-free non-free-firmware" >> /etc/apt/sources.list.d/debian.sources; \
    echo "Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg" >> /etc/apt/sources.list.d/debian.sources'; \
    in-target apt update; \
    in-target apt install -y \
        firmware-linux \
        firmware-linux-nonfree \
        firmware-misc-nonfree \
        intel-microcode \
        amd64-microcode \
        sof-firmware \
        firmware-iwlwifi \
        firmware-realtek \
        firmware-atheros \
        firmware-mediatek \
        firmware-brcm80211 \
        firmware-libertas \
        firmware-ti-connectivity; \
    in-target isenkram-autoinstall-firmware --non-interactive; \
    in-target sed -i 's/# minlen = 8/minlen = 12/' /etc/security/pwquality.conf; \
    in-target sed -i 's/# dcredit = 0/dcredit = -1/' /etc/security/pwquality.conf; \
    in-target sed -i 's/# ucredit = 0/ucredit = -1/' /etc/security/pwquality.conf; \
    in-target sed -i 's/# lcredit = 0/lcredit = -1/' /etc/security/pwquality.conf; \
    in-target sed -i 's/# ocredit = 0/ocredit = -1/' /etc/security/pwquality.conf; \
    in-target sed -i 's/# minclass = 0/minclass = 4/' /etc/security/pwquality.conf; \
    in-target sed -i 's/# retry = 3/retry = 3/' /etc/security/pwquality.conf; \
    in-target sh -c 'echo "Name: Enforce faillock" > /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "Default: yes" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "Priority: 1024" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "Auth-Type: Primary" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "Auth:" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "	[success=1 default=ignore] pam_unix.so try_first_pass" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "	required pam_faillock.so authfail deny=3 unlock_time=1800" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "	required pam_faillock.so preauth silent deny=3 unlock_time=1800" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "Account:" >> /usr/share/pam-configs/faillock_custom'; \
    in-target sh -c 'echo "	required pam_faillock.so" >> /usr/share/pam-configs/faillock_custom'; \
    in-target pam-auth-update --package --enable faillock_custom; \
    in-target adduser user sudo; \
    in-target chage -d 0 user; \
    in-target sh -c 'echo "#!/bin/bash" > /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'lsblk > /tmp/lsblk_dump'; \
    in-target sh -c "echo \"ENCRYPTED_PART=/dev/DOLLAR(grep -B 5 _crypt /tmp/lsblk_dump | grep disk | tail -n 1 | sed 's/^[^[:alnum:]]*//' | cut -d ' ' -f1)\" >> /usr/local/bin/secure-disk-update"; \
    in-target sed -i 's/DOLLAR/\$/' /usr/local/bin/secure-disk-update; \
    in-target sh -c 'echo "OLD_PASS=\"SilverDisk123!\"" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "if [ -z \"\$ENCRYPTED_PART\" ]; then echo \"Error: Disk not found.\"; exit 1; fi" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "while true; do" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "  read -rs -p \"Enter NEW Disk Passphrase: \" p" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "  echo" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "  if echo \"\$p\" | pwscore >/dev/null 2>&1; then" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "    echo -n \"\$p\" | cryptsetup luksChangeKey \"\$ENCRYPTED_PART\" --key-file <(echo -n \"\$OLD_PASS\")" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "    if [ \$? -eq 0 ]; then echo \"Disk password updated.\" && echo \"\" > /etc/issue && echo \"\" > /etc/motd; break; fi" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "  fi" >> /usr/local/bin/secure-disk-update'; \
    in-target sh -c 'echo "done" >> /usr/local/bin/secure-disk-update'; \
    in-target chmod +x /usr/local/bin/secure-disk-update; \
    in-target sh -c 'echo "" >> /etc/issue'; \
    in-target sh -c 'echo "*** ACTION REQUIRED ***" >> /etc/issue'; \
    in-target sh -c 'echo "1. Login to reset USER password." >> /etc/issue'; \
    in-target sh -c 'echo "2. Run: sudo secure-disk-update" >> /etc/issue'; \
    in-target cp /etc/issue /etc/motd; \
    in-target sed -i 's/GRUB_TIMEOUT=[0-9]*/GRUB_TIMEOUT=2/' /etc/default/grub; \
    in-target sed -i '/GRUB_ARGUMENTS/d' /etc/default/grub; \
    in-target sh -c 'echo "GRUB_ARGUMENTS=\"--no-vram\"" >> /etc/default/grub'; \
    in-target update-grub; \
    DATA_DEV=""; \
    for ltr in a b c d e f; do \
        dev="/dev/sd${ltr}2"; \
        if [ -b "$dev" ]; then \
            lbl=$(blkid -s LABEL -o value "$dev" 2>/dev/null || echo ""); \
            if [ "$lbl" = "DATA" ]; then \
                DATA_DEV="$dev"; \
                break; \
            fi; \
        fi; \
    done; \
    echo "Detected data disk: $DATA_DEV" >> /target/var/log/preseed-mount.log; \
    if [ -n "$DATA_DEV" ]; then \
        mkdir -p /target/mnt/data /target/var/log; \
        if mount "$DATA_DEV" /target/mnt/data 2>>/target/var/log/preseed-mount.log; then \
            echo "Mounted $DATA_DEV successfully" >> /target/var/log/preseed-mount.log; \
            in-target mkdir -p /home/user/installation /usr/local/share/ca-certificates/schneider; \
            cp -r /target/mnt/data/* /target/home/user/installation/ 2>>/target/var/log/preseed-mount.log || true; \
            cp /target/home/user/installation/*Proxy.sh /target/home/user/ 2>>/target/var/log/preseed-mount.log || true; \
            in-target chmod +x /home/user/*.sh 2>>/target/var/log/preseed-mount.log || true; \
            if [ -f /tmp/proxy_set ]; then \
               in-target sh -c '/home/user/setProxy.sh 2>>/var/log/preseed-mount.log || echo "Proxy script failed"'; \
            fi; \
            cp /target/home/user/installation/*.crt /target/usr/local/share/ca-certificates/schneider/ 2>>/target/var/log/preseed-mount.log || true; \
            in-target update-ca-certificates 2>>/target/var/log/preseed-mount.log; \
            mkdir -p /target/home/user/.config/dconf/; \
            cp /target/home/user/installation/user /target/home/user/.config/dconf/; \
        else \
            echo "Failed to mount $DATA_DEV" >> /target/var/log/preseed-mount.log; \
        fi; \
    else \
        echo "No DATA partition found in /dev/sd[a-f]2" >> /target/var/log/preseed-mount.log; \
    fi

d-i finish-install/reboot_in_progress note